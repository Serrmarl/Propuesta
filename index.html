<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Ti ❤️</title>
<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  
  background: radial-gradient(circle, #fff0f3 0%, #ffe3e8 100%);

  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  justify-content: center;
}

#game {
  width: 100%;
  height: 70vh;
  max-height: 550px;
  background: #ff99cc;
  border: 5px solid #ff66b2;
  box-shadow: 0 0 20px #ff66b2;
  position: relative;
  overflow: hidden;
  box-sizing: border-box;
}

.pixel {
  image-rendering: pixelated;
}

#character {
  width: 48px;
  height: 48px;
  position: absolute;
  bottom: 20px;
  left: 180px;
  background: url('jenni_peluche.png') no-repeat center;
  background-size: contain;
  image-rendering: pixelated;
}

#spawner {
  width: 60px;
  height: 60px;
  position: absolute;
  top: 10px;
  left: 170px;
  background: url('yo_merengues.png') no-repeat center;
  background-size: contain;
  image-rendering: pixelated;
}

.heart {
  width: 20px;
  height: 20px;
  background: #ff3366;
  position: absolute;
}

.heart::before,
.heart::after {
  content: "";
  width: 20px;
  height: 20px;
  background: #ff3366;
  border-radius: 50%;
  position: absolute;
}

.heart::before {
  top: -10px;
  left: 0;
}

.heart::after {
  left: 10px;
  top: 0;
}

.flower {
  position: absolute;
  font-size: 30px;
}

.frappe {
  position: absolute;
  font-size: 30px;
}

#textBox {
  width: 100%;
  min-height: 120px;
  background: rgba(255,255,255,0.9);
  font-size: 14px;
  text-align: center;
  border: 5px solid #ff66b2;
  box-sizing: border-box;
  margin-top: 10px;
}

#container {
  position: relative;
  width: 90vw;
  max-width: 400px;
  box-sizing: border-box;
}

#scoreBoard {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(255, 255, 255, 0.85);
  color: #ff3366;
  padding: 5px 12px;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 14px;
  border: 3px solid #ff66b2;
  border-radius: 20px;
  z-index: 10;
}
  
#buttons {
  margin-top: 20px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  background: #ff66b2;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  font-weight: bold;
}

#startScreen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffb3d1;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  cursor: pointer;
  text-align: center;
}

.start-content h2 {
  color: #ff3366;
  font-size: 24px;
  margin-bottom: 10px;
}

.start-content p {
  color: white;
  font-size: 14px;
  font-weight: bold;
  animation: blink 1.2s infinite; 
}

@keyframes blink {
  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}

#winScreen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffb3d1;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
  text-align: center;
  color: white;
  font-family: 'Courier New', monospace;
  animation: fadeIn 1s ease-in-out;
}

.win-content h1 {
  font-size: 40px;
  margin: 0 0 10px 0;
  text-shadow: 2px 2px #ff3366;
  animation: bounce 0.6s infinite alternate;
}

.win-content p {
  font-size: 18px;
  font-weight: bold;
  margin: 5px 0;
}

.win-content .subtext {
  font-size: 14px;
  opacity: 0.9;
}

.win-content .heart-icon {
  font-size: 30px;
  margin-top: 20px;
}

/* Animaciones */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.shake-animation {
  animation: shake 0.3s ease-in-out;
  border-color: #ff3366 !important;
}
  
</style>
</head>
<body>

<div id="container">

  <div id="game">
    <div id="startScreen" onclick="startGame()">
      <div class="start-content">
        <h2>Un juego para ti ❤️</h2>
        <p>Toca la pantalla para empezar</p>
      </div>
    </div>

    <div id="winScreen" style="display: none;">
      <div class="win-content">
        <h1>¡SÍ! 🎉</h1>
        <p>Sabía que dirías que sí ❤️</p>
        <p class="subtext">Te amo muchísimo 💕</p>
        <div class="heart-icon">👑🌸🐥</div>
      </div>
    </div>
    
    <div id="scoreBoard">Puntos: <span id="scoreNumber">0</span></div>
    <div id="spawner"></div>
    <div id="character"></div>
  </div>

  <div id="textBox">
    <div id="text">Recoge los corazones ❤️</div>
  </div>

</div>

<script>
const character = document.getElementById("character");
const game = document.getElementById("game");
const text = document.getElementById("text");
const scoreNumber = document.getElementById("scoreNumber");

let score = 0;
let lastType = null;
let yesScale = 1;
let noScale = 1;

let spawnerDirection = 1;
let spawnerSpeed = 2;
let gameStarted = false; // Control de inicio global

let messages = [
  "Eres lo mejor que me ha pasado ❤️",
  "Cada momento contigo es especial ✨",
  "Me haces muy feliz 🐥",
  "Quiero seguir contigo mucho tiempo 💖",
  "¿Quieres ser mi novia?"
];

// Movimiento Teclado
window.addEventListener("keydown", (e) => {
  if (!gameStarted) return; // No mover si no ha iniciado
  let left = character.offsetLeft;
  if (e.key === "ArrowLeft" && left > 0) {
    character.style.left = left - 20 + "px";
  }
  if (e.key === "ArrowRight" && left < (game.offsetWidth - character.offsetWidth)) {
    character.style.left = left + 20 + "px";
  }
});

// Función de Movimiento Táctil / Mouse
const moveCharacterAt = (clientX) => {
  if (!gameStarted) return; // Clave: No mover si la pantalla de inicio sigue activa
  const gameRect = game.getBoundingClientRect();
  let relativeX = clientX - gameRect.left - (character.offsetWidth / 2);
  
  if (relativeX < 0) relativeX = 0;
  if (relativeX > game.offsetWidth - character.offsetWidth) {
    relativeX = game.offsetWidth - character.offsetWidth;
  }
  
  character.style.left = relativeX + "px";
};

// Eventos de movimiento
game.addEventListener("touchmove", (e) => {
  if (!gameStarted) return;
  e.preventDefault(); 
  moveCharacterAt(e.touches[0].clientX);
}, { passive: false });

game.addEventListener("mousemove", (e) => {
  if (!gameStarted) return;
  moveCharacterAt(e.clientX);
});
  
// Crear corazones
function createHeart() {
  const item = document.createElement("div");
  const spawner = document.getElementById("spawner");

  setTimeout(() => {
    let left = spawner.offsetLeft + (spawner.offsetWidth / 2 - item.offsetWidth / 2);
    if (left < 0) left = 0;
    if (left > game.offsetWidth - item.offsetWidth) {
      left = game.offsetWidth - item.offsetWidth;
    }
    item.style.left = left + "px";
  }, 0);
  
  item.style.top = spawner.offsetTop + spawner.offsetHeight + 5 + "px";

  const types = ["heart", "flower", "frappe"];
  let randomType;
  do {
    randomType = types[Math.floor(Math.random() * types.length)];
  } while (randomType === lastType);

  lastType = randomType;
  item.classList.add(randomType);

  if (randomType === "frappe") {
    item.innerHTML = "🧋";
  }
  if (randomType === "flower") {
    item.innerHTML = "🌻";
  }

  let offset = (Math.random() * 100) - 50;
  item.style.left = spawner.offsetLeft + (spawner.offsetWidth / 2 - 10 + offset) + "px";
  game.appendChild(item);

  let fall = setInterval(() => {
    let top = item.offsetTop;
    item.style.top = top + 5 + "px";

    // Colisión
    if (
      top > (game.offsetHeight - character.offsetHeight - 40) &&
      item.offsetLeft < character.offsetLeft + character.offsetWidth &&
      item.offsetLeft + item.offsetWidth > character.offsetLeft
    ) {
      score++;
      scoreNumber.innerText = score;
      item.remove();
      clearInterval(fall);

      if (score <= messages.length) {
        text.innerHTML = messages[score - 1];
      }

      if (score === messages.length) {
        setTimeout(() => {
          text.innerHTML += `
            <div id="buttons">
              <button id='yesButton' onclick='yes()'>Sí 💖</button>
              <button id='noButton' onclick='moveNoButton()'>No 😢</button>
            </div>
          `;
        }, 500);
      }
    }

    // Caída al suelo (Penalización)
    if (top > game.offsetHeight) {
      if (score < messages.length) {
        if (score > 0) {
          score--;
          scoreNumber.innerText = score;
          
          const scoreBoard = document.getElementById("scoreBoard");
          scoreBoard.classList.add("shake-animation");
          setTimeout(() => scoreBoard.classList.remove("shake-animation"), 300);
        }
        
        text.innerHTML = "<span style='color: #ff3366; font-weight: bold;'>¡No los dejes caer! 😭 Atrapa otro</span>";
        
        let currentScore = score;
        setTimeout(() => {
          if (score === currentScore && score < messages.length) {
            text.innerHTML = score > 0 ? messages[score - 1] : "Recoge los corazones ❤️";
          }
        }, 1500);
      }

      item.remove();
      clearInterval(fall);
    }
  }, 50);
}

const noMessages = [
  "¿Segura? 😭",
  "Piénsalo otra vez 💔",
  "El destino dice que sí 👀",
  "Ese botón ya está sufriendo 😢",
  "No acepto esa respuesta 😏",
  "Vamos… sabes que quieres decir que sí 💖",
  "El botón 'Sí' se está emocionando ✨",
  "Ya casi desaparece el 'No' 😂"
];

let messageIndex = 0;

function moveNoButton() {
  const noButton = document.getElementById("noButton");
  const yesButton = document.getElementById("yesButton");
  const text = document.getElementById("text");

  text.innerHTML = `
  ${noMessages[messageIndex]}
  <div id="buttons">
    <button id='yesButton' onclick='yes()'>Sí 💖</button>
    <button id='noButton' onclick='moveNoButton()'>No 😢</button>
  </div>
  `;

  messageIndex++;
  if (messageIndex >= noMessages.length) {
    messageIndex = 0;
  }

  const newNoButton = document.getElementById("noButton");
  const newYesButton = document.getElementById("yesButton");
  const game = document.getElementById("game");

  let maxX = game.offsetWidth - newNoButton.offsetWidth;
  let maxY = game.offsetHeight - newNoButton.offsetHeight;

  let randomX = Math.random() * maxX;
  let randomY = Math.random() * maxY;

  newNoButton.style.position = "absolute";
  newNoButton.style.left = randomX + "px";
  newNoButton.style.top = randomY + "px";

  yesScale += 0.2;
  newYesButton.style.transform = `scale(${yesScale})`;

  noScale -= 0.1;
  if (noScale <= 0) {
    newNoButton.style.display = "none";
  } else {
    newNoButton.style.transform = `scale(${noScale})`;
  }
}

function moveSpawner() {
  const spawner = document.getElementById("spawner");
  const game = document.getElementById("game");

  let left = spawner.offsetLeft + spawnerSpeed * spawnerDirection;

  if (left <= 0) {
    left = 0;
    spawnerDirection = 1;
  }
  if (left >= game.offsetWidth - spawner.offsetWidth) {
    left = game.offsetWidth - spawner.offsetWidth;
    spawnerDirection = -1;
  }

  spawner.style.left = left + "px";
}

// Función de inicio corregida
function startGame() {
  if (gameStarted) return; 
  gameStarted = true;

  document.getElementById("startScreen").style.display = "none";

  setInterval(createHeart, 1500);
  setInterval(moveSpawner, 20);
}

function yes() {
  text.innerHTML = "Sabía que dirías que sí ❤️ Te amo mucho 💕";

  const winScreen = document.getElementById("winScreen");
  winScreen.style.display = "flex";

  let id = window.setInterval(function() {}, 0);
  while (id--) {
    window.clearInterval(id);
  }

  const activeItems = game.querySelectorAll(".heart, .flower, .frappe");
  activeItems.forEach(item => item.remove());
}
</script>

</body>
</html>
